<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon mail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="content">
        <article class="chatsbar">

            <div class="chatsbar__header">
                <div class="chatsbar__header-nav">
                   <search class="search__bar">
                        <svg class="search__icon" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#7f91a4"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
                        
                        <input type="text" placeholder="Поиск" id="search-input">
                   </search>
                   <button class="options-button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path class="icon" d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
                   </button>
                </div>
                
                

                <ul class="chats__folders" style="list-style: none;">
                    <li><a href="#" class="chats__folder chats__folder-active">Friends</a></li>
                    <li><a href="#" class="chats__folder">Family</a></li>
                </ul>    
            </div>
            <ul class="chats">
               <section class="chat-unit">
                    <figure>
                        <img class="profile-pic" alt="profile picture" src="/profile pics/pfp1.jpg">
                    </figure>
                    
                    
                    <div class="chat-unit__container">
                        <h2 class="username">Арсенич</h2>
                        <h3 class="last-message">До завтра</h3>  
                    </div>
                
                </section>
                <section class="chat-unit">
                    <figure>
                       <img class="profile-pic" alt="profile picture" src="/profile pics/pfp2.jpg"> 
                    </figure>
                    
                    
                    <div class="chat-unit__container">
                       <h2 class="username">Алиш</h2>
                       <h3 class="last-message">Когда по шаурме?</h3>  
                    </div>
                    
                </section> 
                <section class="chat-unit chat-unit-active">
                    <figure>
                       <img class="profile-pic" alt="profile picture" src="/profile pics/pfp3.jpg"> 
                    </figure>
                    
                    
                    <div class="chat-unit__container">
                       <h2 class="username">Ликорисик~</h2>
                       <h3 class="last-message">Доброй ночи :3</h3>  
                    </div>
                    
                </section> 
            </ul>
            

        </article>
        <article class="chat">

            <div class="chat__header">

                <figure>
                    <img alt="profile picture" class="profile-pic" src="/profile pics/pfp3.jpg">
                </figure>
                <div class="chat__header-container">
                    <h2 class="username">Ликорисик</h2>

                    <h3 class="recentliness">Был(а) недавно</h3>  
                </div>
                

                <nav class="chat-nav">
                    <button class="chat-nav__button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path class="icon" d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12ZM241-600l66-66-17-94h-89q5 41 14 81t26 79Zm358 358q39 17 79.5 27t81.5 13v-88l-94-19-67 67ZM241-600Zm358 358Z"/></svg>
                    </button>
                    <button class="chat-nav__button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path class="icon" d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
                    </button>
                    <button class="chat-nav__button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path class="icon" d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
                    </button>
                </nav>

                

            </div>

            <div class="messages">

                <h4 class="chat_message chat_message-from_me">Приветики</h4>
                <h4 class="chat_message chat_message-from-user">О, привета</h4>
                <h4 class="chat_message chat_message-from-user">Как делишки? :3</h4>
                <h4 class="chat_message chat_message-from_me">Усё заебися</h4>
                <h4 class="chat_message chat_message-from-user">Хихи рад это слышать</h4>
                <h4 class="chat_message chat_message-from-user">Какие планы на сегодня?</h4>
                <h4 class="chat_message chat_message-from_me">Кодить и верстать, ну все как всегда</h4>
            </div>

        </article>
    </main>
</body>
</html>
